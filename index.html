<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Just One More Scroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="topbar">
    <span>Just One More Scroll</span>
    <button id="focusBtn">Start Focus Mode</button>
  </div>

  <div id="feed"></div>

  <div id="bottombar">
    <input type="text" id="taskInput" placeholder="Enter a task…" />
    <button id="addTask">Add</button>
  </div>

  <div id="timerDisplay" class="hidden">⏱ <span id="timerText">25:00</span></div>

  <script src="script.js"></script>
</body>
</html>
